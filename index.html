<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엄마 병원 기록 대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f2f4f8;color:#1e2a38;font-size:14px;}
header{background:linear-gradient(135deg,#1a3a4a,#2d6a8a);color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;}
header h1{font-size:19px;font-weight:700;letter-spacing:-0.3px;}
header .sub{font-size:11px;opacity:.7;margin-top:3px;}
.tab-nav{display:flex;background:#fff;border-bottom:2px solid #e4e8ef;padding:0 24px;}
.tab-btn{padding:13px 22px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:#8a9ab0;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:inherit;}
.tab-btn.active{color:#1a3a4a;border-bottom-color:#2d6a8a;}
.tab-btn:hover{color:#1a3a4a;}
.tab-content{display:none;}.tab-content.active{display:block;}
.container{max-width:1100px;margin:0 auto;padding:20px;}
.section{background:#fff;border-radius:12px;padding:20px 22px;margin-bottom:18px;box-shadow:0 1px 5px rgba(0,0,0,.06);}
.section-title{font-size:14px;font-weight:700;color:#1e2a38;margin-bottom:14px;display:flex;align-items:center;gap:7px;}

/* STATUS CARDS */
.status-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
.status-card{background:#fff;border-radius:10px;border:1px solid #e8edf3;border-left:4px solid;padding:14px 15px;transition:transform .15s,box-shadow .15s;position:relative;}
.status-card:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.1);}
.status-card.red{border-left-color:#e74c3c;}.status-card.orange{border-left-color:#e67e22;}
.status-card.yellow{border-left-color:#f39c12;}.status-card.green{border-left-color:#27ae60;}
.status-card.blue{border-left-color:#3498db;}
.card-head{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.card-icon{font-size:16px;}.card-title{font-size:13px;font-weight:700;}
.card-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;margin-left:auto;}
.red .card-badge{background:#fdecea;color:#e74c3c;}.orange .card-badge{background:#fef3e8;color:#e67e22;}
.yellow .card-badge{background:#fef9e7;color:#f39c12;}.green .card-badge{background:#e8f8f0;color:#27ae60;}
.blue .card-badge{background:#ebf5fb;color:#3498db;}
.card-status-line{font-size:11px;color:#7f8c8d;margin-bottom:8px;}
.card-opinion-toggle{font-size:11px;color:#3498db;cursor:pointer;display:flex;align-items:center;gap:3px;background:none;border:none;font-family:inherit;padding:0;margin-bottom:6px;}
.card-opinion{font-size:11px;color:#4a5568;line-height:1.65;background:#f8fafc;border-radius:6px;padding:9px 10px;display:none;border-left:3px solid #bdc8d8;}
.card-opinion.open{display:block;}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0;}
.card-next{font-size:10px;color:#a0aab4;}.card-link{font-size:10px;color:#3498db;font-weight:600;cursor:pointer;}

/* UPCOMING */
.upcoming-list{display:flex;flex-direction:column;gap:7px;}
.up-item{display:flex;align-items:flex-start;gap:12px;padding:10px 13px;border-radius:8px;background:#f9fbfd;border:1px solid #eaeff5;}
.up-date{font-size:11px;font-weight:700;color:#1a3a4a;min-width:90px;line-height:1.5;}
.up-body{flex:1;}.up-title{font-size:13px;font-weight:600;}.up-detail{font-size:11px;color:#888;margin-top:2px;}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;margin-right:5px;}
.badge-red{background:#fdecea;color:#e74c3c;}.badge-orange{background:#fef3e8;color:#e67e22;}
.badge-blue{background:#ebf5fb;color:#3498db;}.badge-green{background:#e8f8f0;color:#27ae60;}
.badge-gray{background:#f0f0f0;color:#888;}.badge-purple{background:#f3e8fd;color:#8e44ad;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:14px;width:90%;max-width:680px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-header h2{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#888;line-height:1;}
.modal-body{padding:16px 22px;overflow-y:auto;flex:1;}

/* FILTERS */
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;align-items:center;}
.filter-row label{font-size:11px;color:#888;white-space:nowrap;flex-shrink:0;}
.filter-chip{font-size:11px;padding:4px 12px;border:1.5px solid #dde3ec;border-radius:20px;background:#fff;cursor:pointer;transition:all .12s;font-family:inherit;white-space:nowrap;}
.filter-chip:hover,.filter-chip.active{background:#1a3a4a;color:#fff;border-color:#1a3a4a;}
.search-box{padding:6px 13px;border:1.5px solid #dde3ec;border-radius:20px;font-size:12px;font-family:inherit;outline:none;min-width:180px;}
.search-box:focus{border-color:#2d6a8a;}

/* TIMELINE */
.timeline{display:flex;flex-direction:column;}
.tl-item{display:flex;gap:0;}
.tl-left{width:110px;flex-shrink:0;padding:11px 10px 11px 0;text-align:right;}
.tl-date{font-size:11px;font-weight:700;color:#2d6a8a;line-height:1.4;}
.tl-center{display:flex;flex-direction:column;align-items:center;padding:0 10px;}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:13px;border:2px solid #fff;box-shadow:0 0 0 1.5px #3498db;background:#3498db;}
.tl-dot.surgery{background:#e74c3c;box-shadow:0 0 0 1.5px #e74c3c;}
.tl-line{width:2px;background:#e5eaf2;flex:1;margin-top:2px;}
.tl-right{flex:1;padding-bottom:3px;}
.tl-card{background:#fff;border:1px solid #eaeff5;border-radius:8px;padding:10px 13px;margin:5px 0;cursor:pointer;transition:background .1s;}
.tl-card:hover{background:#f5f9ff;}
.tl-row1{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.tl-hospital{font-size:12px;font-weight:700;color:#1a3a4a;}
.tl-cat{font-size:10px;color:#a0aab4;}
.tl-summary{font-size:11px;color:#6c7a8d;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:460px;}
.tl-full{font-size:11px;color:#4a5568;margin-top:5px;line-height:1.65;display:none;}
.tl-full.open{display:block;}
.count-badge{font-size:11px;background:#eef2f7;color:#7f8c8d;padding:2px 9px;border-radius:10px;}
.show-more{text-align:center;margin-top:10px;}
.show-more button{font-size:12px;color:#3498db;background:none;border:1.5px solid #3498db;border-radius:20px;padding:5px 18px;cursor:pointer;font-family:inherit;}
.show-more button:hover{background:#3498db;color:#fff;}

/* MEDS TAB */
.meds-updated{font-size:11px;color:#888;margin-bottom:14px;}
.med-group-label{font-size:11px;font-weight:700;color:#a0aab4;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 6px;padding-left:2px;}
.med-card{background:#fff;border-radius:10px;border:1px solid #e8edf3;border-left:4px solid #3498db;padding:14px 16px;display:grid;grid-template-columns:1fr auto;gap:6px;margin-bottom:8px;}
.med-card.psych{border-left-color:#8e44ad;}
.med-card.cardio{border-left-color:#e74c3c;}
.med-card.thyroid{border-left-color:#27ae60;}
.med-card.digest{border-left-color:#f39c12;}
.med-card.expiring{background:#fffbf0;border-color:#f1c40f;border-left-color:#e67e22;}
.med-top{display:flex;align-items:flex-start;gap:8px;grid-column:1/-1;}
.med-name{font-size:13px;font-weight:700;color:#1a3a4a;}
.med-type-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:#ebf5fb;color:#2980b9;white-space:nowrap;flex-shrink:0;}
.med-card.psych .med-type-badge{background:#f3e8fd;color:#8e44ad;}
.med-card.cardio .med-type-badge{background:#fdecea;color:#c0392b;}
.med-card.thyroid .med-type-badge{background:#e8f8f0;color:#27ae60;}
.med-card.digest .med-type-badge{background:#fef9e7;color:#d68910;}
.med-card.expiring .med-type-badge{background:#fef0d3;color:#d35400;}
.med-meta{font-size:11px;color:#7f8c8d;margin-top:3px;}
.med-desc{font-size:11px;color:#4a5568;line-height:1.6;grid-column:1/-1;margin-top:4px;}
.med-note{font-size:10px;color:#a0aab4;grid-column:1/-1;margin-top:4px;padding-top:4px;border-top:1px dashed #eee;}
.expiry-warn{font-size:10px;font-weight:600;color:#e67e22;background:#fef0d3;padding:2px 8px;border-radius:6px;white-space:nowrap;}

@media(max-width:600px){
  .status-grid{grid-template-columns:1fr 1fr;}
  .tl-left{width:80px;}
  .tl-summary{max-width:200px;}
  .med-card{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>
  <div>
    <h1>🏥 엄마 병원 기록</h1>

<div class="tab-content active" id="tab-status">

  </div>
</div>
</div>

<!-- ═══ TAB 2: 진료 기록 ═══ -->
<div class="tab-content" id="tab-records">
<div class="container">
  <div class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;">

    <div class="filter-row">

    </div>
    <div class="timeline" id="timeline"></div>
    <div class="show-more" id="showMoreBtn" style="display:none"><button onclick="showMore()">더 보기</button></div>
  </div>
</div>
</div>

<!-- ═══ TAB 3: 복용약 ═══ -->
<div class="tab-content" id="tab-meds">
<div class="container">
  <div class="section">
    <div class="section-title">💊 현재 복용약 <span style="font-weight:400;font-size:12px;color:#888">— 총 11종 · 기준일: 2026년 6월 4일</span></div>

    <div id="medSection"></div>
  </div>
</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOut(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" onclick="closeModal()">×</button>

    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

     note:"수술 전 1주일 이상 중단 필요. 위장 자극 있으면 식후 복용"},

  {group:"🟢 갑상선",cards:[
    {name:"씬지로이드정 0.1mg",cls:"thyroid",type:"갑상선호르몬제",component:"levothyroxine sodium",dose:"1정 · 1일 1회",hospital:"고려대학교병원(안암)",prescribed:"2026.02.11",days:"180일",expiring:false,
     desc:"갑상선 수술 후 부족해진 갑상선 호르몬을 보충하는 약입니다. 수술로 갑상선 조직을 제거했기 때문에 평생 복용이 필요합니다. TSH 수치에 따라 용량이 조정됩니다.",
     note:"⚠️ 반드시 공복에 복용 (식전 30분~1시간). 칼슘·철분제와 최소 4시간 간격"},

// ── TABS ────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── STATUS CARDS ────────────────────────
function renderStatusCards() {
  const grid = document.getElementById('statusGrid');
  statusData.forEach(s => {
    const card = document.createElement('div');
    card.className = `status-card ${s.level}`;
    card.innerHTML = `
      <div class="card-head"><span class="card-icon">${s.icon}</span><span class="card-title">${s.title}</span><span class="card-badge">${s.status}</span></div>
      <div class="card-status-line">${s.desc}</div>
      <button class="card-opinion-toggle" onclick="toggleOpinion(this,event)">📋 주치의 소견 ▾</button>
      <div class="card-opinion">🩺 <em>${s.opinion}</em></div>
      <div class="card-footer">
        <span class="card-next">📌 ${s.next}</span>
        <span class="card-link" onclick="openCatModal('${s.cat}','${s.title}',event)">관련 기록 →</span>
      </div>`;
    grid.appendChild(card);
  });
}
function toggleOpinion(btn, e) {
  e.stopPropagation();
  const op = btn.nextElementSibling;
  op.classList.toggle('open');
  btn.textContent = op.classList.contains('open') ? '📋 주치의 소견 ▴' : '📋 주치의 소견 ▾';
}

// ── MODAL ───────────────────────────────
function openCatModal(cat, title, e) {
  if (e) e.stopPropagation();
  const filtered = records.filter(r => r.category === cat).sort((a,b) => b.date.localeCompare(a.date));
  document.getElementById('modalTitle').textContent = `${title} 관련 진료 기록 (${filtered.length}건)`;
  const body = document.getElementById('modalBody');
  body.innerHTML = '';
  filtered.forEach(r => {
    const isSurgery = r.type === '수술 및 시술';
    const div = document.createElement('div');
    div.style.cssText = 'padding:10px 12px;border-radius:8px;background:#f9fbfd;border:1px solid #eaeff5;margin-bottom:7px;';
    div.innerHTML = `
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;">
        <span style="font-size:11px;font-weight:700;color:#2d6a8a;">${r.date}</span>
        <span style="font-size:12px;font-weight:700;">${r.hospital}</span>
        <span style="font-size:10px;padding:1px 7px;border-radius:10px;${isSurgery?'background:#fdecea;color:#e74c3c':'background:#ebf5fb;color:#3498db'}">${r.type}</span>
      </div>
      <div style="font-size:11px;color:#4a5568;line-height:1.6;">${r.detail}</div>
      ${r.note?`<div style="font-size:10px;color:#a0aab4;margin-top:3px;">📝 ${r.note}</div>`:''}`;
    body.appendChild(div);
  });
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOut(e) { if (e.target.id === 'modalOverlay') closeModal(); }

// ── UPCOMING ────────────────────────────
function renderUpcoming() {
  const list = document.getElementById('upcomingList');
  upcoming.forEach(u => {
    list.innerHTML += `<div class="up-item">
      <div class="up-date">${u.date}</div>
      <div class="up-body">
        <div class="up-title"><span class="badge badge-${u.badge}">${u.badgeText}</span>${u.title}</div>
        <div class="up-detail">${u.detail}</div>
      </div></div>`;
  });
}

// ── MEDICATIONS ──────────────────────────
function renderMeds() {
  const sec = document.getElementById('medSection');
  medications.forEach(group => {
    sec.innerHTML += `<div class="med-group-label">${group.group}</div>`;
    group.cards.forEach(m => {
      sec.innerHTML += `
        <div class="med-card ${m.cls}${m.expiring?' expiring':''}">
          <div class="med-top">
            <div>
              <div class="med-name">${m.name} ${m.expiring?'<span class="expiry-warn">⚠️ 재처방 확인</span>':''}</div>
              <div class="med-meta">${m.component} · ${m.dose} · ${m.hospital} · ${m.prescribed} 처방 (${m.days})</div>
            </div>
            <span class="med-type-badge">${m.type}</span>
          </div>
          <div class="med-desc">${m.desc}</div>
          <div class="med-note">⚠️ ${m.note}</div>
        </div>`;
    });
  });
}

// ── FILTERS ──────────────────────────────
let currentPeriod = '전체';
let currentCat = '전체';
let currentHosp = '전체';
let visibleCount = 25;

const periodOptions = [
  {label:'전체', from:'0000', to:'9999'},
  {label:'2026', from:'2026', to:'2026'},
  {label:'2025', from:'2025', to:'2025'},
  {label:'2024', from:'2024', to:'2024'},
  {label:'2023', from:'2023', to:'2023'},
  {label:'2022', from:'2022', to:'2022'},
  {label:'~2021 이전', from:'0000', to:'2021'},
];
const categories = ['전체', ...new Set(records.map(r => r.category))];
const hospitals  = ['전체', ...new Set(records.map(r => r.hospital))];

function buildFilters() {
  const pRow = document.getElementById('periodFilterRow');
  const cRow = document.getElementById('catFilterRow');
  const hRow = document.getElementById('hospFilterRow');

  periodOptions.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (i === 0 ? ' active' : '');
    btn.textContent = p.label;
    btn.onclick = () => {
      document.querySelectorAll('#periodFilterRow .filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPeriod = p.label; visibleCount = 25; renderTimeline();
    };
    pRow.appendChild(btn);
  });

  categories.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (i === 0 ? ' active' : '');
    btn.textContent = c;
    btn.onclick = () => {
      document.querySelectorAll('#catFilterRow .filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = c; visibleCount = 25; renderTimeline();
    };
    cRow.appendChild(btn);
  });

  hospitals.forEach((h, i) => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (i === 0 ? ' active' : '');
    btn.textContent = h;
    btn.onclick = () => {
      document.querySelectorAll('#hospFilterRow .filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentHosp = h; visibleCount = 25; renderTimeline();
    };
    hRow.appendChild(btn);
  });

  document.getElementById('searchBox').addEventListener('input', () => { visibleCount = 25; renderTimeline(); });
}

function getFiltered() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const pOpt = periodOptions.find(p => p.label === currentPeriod) || periodOptions[0];
  return [...records]
    .sort((a, b) => b.date.localeCompare(a.date))
    .filter(r => {
      const yr = r.date.substring(0, 4);
      const matchP = yr >= pOpt.from && yr <= pOpt.to;
      const matchC = currentCat === '전체' || r.category === currentCat;
      const matchH = currentHosp === '전체' || r.hospital === currentHosp;
      const matchS = !search || r.hospital.toLowerCase().includes(search) || r.detail.toLowerCase().includes(search) || r.category.toLowerCase().includes(search);
      return matchP && matchC && matchH && matchS;
    });
}

// ── TIMELINE ─────────────────────────────
function renderTimeline() {
  const filtered = getFiltered();
  document.getElementById('timelineCount').textContent = filtered.length + '건';
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  const toShow = filtered.slice(0, visibleCount);
  toShow.forEach((r, idx) => {
    const isSurgery = r.type === '수술 및 시술';
    const item = document.createElement('div');
    item.className = 'tl-item';
    item.innerHTML = `
      <div class="tl-left"><div class="tl-date">${r.date}</div></div>
      <div class="tl-center">
        <div class="tl-dot ${isSurgery?'surgery':''}"></div>
        ${idx < toShow.length-1 ? '<div class="tl-line"></div>' : ''}
      </div>
      <div class="tl-right">
        <div class="tl-card" onclick="toggleTlFull(this)">
          <div class="tl-row1">
            <span class="tl-hospital">${r.hospital}</span>
            <span class="badge ${isSurgery?'badge-red':'badge-blue'}">${r.type}</span>
            <span class="tl-cat">${r.category}</span>
          </div>
          <div class="tl-summary">${r.detail.substring(0,90)}${r.detail.length>90?'…':''}</div>
          <div class="tl-full">${r.detail}${r.note?`<br><span style="color:#aaa">📝 ${r.note}</span>`:''}</div>
        </div>
      </div>`;
    tl.appendChild(item);
  });
  document.getElementById('showMoreBtn').style.display = filtered.length > visibleCount ? 'block' : 'none';
}

function toggleTlFull(el) {
  const full = el.querySelector('.tl-full');
  const summary = el.querySelector('.tl-summary');
  full.classList.toggle('open');
  summary.style.display = full.classList.contains('open') ? 'none' : 'block';
}
function showMore() { visibleCount += 25; renderTimeline(); }

// ── INIT ────────────────────────────────
renderStatusCards();
renderUpcoming();
renderMeds();
buildFilters();
renderTimeline();
</script>
</body>
</html>
